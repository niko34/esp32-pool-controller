; Seul esp32dev est construit par `pio run` / deploy.sh.
; L'env `native` (tests unitaires) ne se lance qu'explicitement : `pio test -e native`.
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 115200

upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
upload_resetmethod = nodemcu

board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.flash_size = 4MB
; Layout v2 (ADR-0015) : spiffs 832 KB (réduit pour passer app à 1.5 MB).
board_build.filesystem_size = 851968

lib_deps =
  https://github.com/me-no-dev/AsyncTCP.git
  https://github.com/me-no-dev/ESPAsyncWebServer.git
  https://github.com/alanswx/ESPAsyncWiFiManager.git
  bblanchon/ArduinoJson @ ^7.0.0
  knolleary/PubSubClient @ ^2.8
  ; feature-021 : Adafruit_ADS1X15 et DFRobot_PH supprimés (migration Atlas EZO).
  ; pH/ORP désormais lus en I²C natif via src/atlas_ezo.* (pas de lib externe).
  milesburton/DallasTemperature @ ^3.11.0
  paulstoffregen/OneWire @ ^2.3.8
  adafruit/RTClib @ ^2.1.4
  SPI

build_flags =
  -DASYNC_TCP_SSL_ENABLED=0
  -Os
  -DCONFIG_LWIP_MAX_SOCKETS=24
  -DCONFIG_LWIP_TCP_MAXRTX=5
; Borne les retransmissions TCP à ~10s avant abandon socket (vs 12 retrans/~75s par défaut). Global à toute la pile lwip — impact mineur sur AsyncWebServer/OTA en réseau dégradé. Voir feature-014 IT3 et ADR-0011 section Évolutions.

# Note: Use ./build_fs.sh to build LittleFS with correct size (1344KB)
# PlatformIO's default buildfs uses wrong size from board definition

; =============================================================================
; Env native — tests unitaires hors matériel (feature-025)
; =============================================================================
; Compile UNIQUEMENT src/sensor_filter.cpp (logique pure, déterministe) avec un
; shim Arduino minimal (test/native_shim/Arduino.h) qui ne fournit que NAN /
; isnan / fabsf / types entiers — aucun mock métier. Lancer : `pio test -e native`.
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<sensor_filter.cpp> +<dosing_logic.cpp> +<schedule_logic.cpp> +<history_logic.cpp>
build_flags =
  -std=c++17
  -I src
  -I test/native_shim
  ; Force-include le shim logger AVANT tout : neutralise src/logger.h (qui tire
  ; <vector>/<FS.h>/freertos, indisponibles en natif) et fournit String + systemLogger.
  -include test/native_shim/logger_shim.h

; =============================================================================
; Env native_coverage — identique à `native` + instrumentation gcov/llvm-cov.
; =============================================================================
; Mesure la couverture des classes pures testées (sensor_filter, dosing_logic).
; Ne PAS utiliser pour le run de test normal (plus lent, génère des .gcda).
; Lancer via le script outillé : `./tools/coverage.sh` (qui appelle gcovr).
[env:native_coverage]
extends = env:native
build_flags =
  ${env:native.build_flags}
  -O0
  -g
  --coverage
build_type = debug
; --coverage doit aussi être présent à l'édition de liens (cf. tools/coverage_link.py).
extra_scripts = pre:tools/coverage_link.py
