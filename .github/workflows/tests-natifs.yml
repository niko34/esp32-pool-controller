name: Tests natifs

# Exécute la suite de tests Unity hors matériel (logique pure : sensor_filter,
# dosing_logic) sur le runner Linux — aucun ESP32 requis. Sert de filet de
# sécurité partagé : bloque toute PR / push sur main qui casse un test ou fait
# chuter la couverture de lignes sous le seuil.

on:
  push:
    branches: [main]
  pull_request:

# Annule un run précédent encore en cours sur la même réf (économie de minutes CI).
concurrency:
  group: tests-natifs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: Tests natifs + couverture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO & pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Installer PlatformIO + gcovr
        run: |
          python -m pip install --upgrade pip
          pip install platformio gcovr

      # Gate principal : les tests doivent passer (env non instrumenté = ce que
      # lance le développeur en local).
      - name: Tests Unity (pio test -e native)
        run: pio test -e native

      # Mesure de couverture sur l'env instrumenté + seuil minimal de lignes.
      # gcc/gcov sont fournis par le runner ubuntu (gcovr les utilise par défaut).
      - name: Couverture (gcovr, seuil lignes ≥ 90%)
        run: |
          pio test -e native_coverage
          mkdir -p coverage
          gcovr --root . \
            --filter 'src/sensor_filter\.(cpp|h)' \
            --filter 'src/dosing_logic\.(cpp|h)' \
            --txt --print-summary \
            --fail-under-line 90 \
            --html-details coverage/index.html \
            .pio/build/native_coverage

      # Rapport HTML consultable depuis l'onglet "Artifacts" du run.
      - name: Publier le rapport de couverture (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14
